[llm]
base_url = https://www.right.codes/codex/v1
api_key = <YOUR_API_KEY>
model = gpt-5.4-mini

[translation]
batch_size = 200
chunk_minutes = 30
parallel = 16
request_interval = 1.0
retry = 6
timeout = 240
sleep = 0.2
disable_proxy = true
copy_back = __video_dir__

[workers]
extract_workers = 10
stt_workers = 8
stt_whisperx_workers = 2
translate_workers = 8
scheduler_interval_sec = 180
poll_interval_sec = 1

[timeouts]
extract_timeout_sec = 1200
stt_timeout_sec = 7200
stt_whisperx_timeout_sec = 7200
translate_timeout_sec = 7200
lease_timeout_sec = 600

[retry]
extract_max_retries = 2
stt_max_retries = 2
stt_whisperx_max_retries = 2
translate_max_retries = 2

[runtime]
db_path = ./tmp/whisper_stt_service.db
progress_ttl_sec = 3600
log_root = ./tmp/logs
model_path = /abs/path/to/faster-whisper-model

[stt]
device = auto
compute_type = auto
batch_size = 8
beam_size = 5
best_of = 5
patience = 1.0
condition_on_previous_text = false
vad_filter = true
vad_threshold = 0.45
vad_min_speech_duration_ms = 200
vad_max_speech_duration_s = 18
vad_min_silence_duration_ms = 700
vad_speech_pad_ms = 300
no_speech_threshold = 0.6
compression_ratio_threshold = 2.2
log_prob_threshold = -1.0
hallucination_silence_threshold = 1.5
initial_prompt =
hotwords =

[stt_whisperx]
model = /abs/path/to/faster-whisper-model
device = auto
compute_type = auto
batch_size = 16
vad_config_path = /home/base/repo/video-stt-whisper-server/models/whisperx/vad/pyannote/config.yaml
align_model_root = /home/base/repo/video-stt-whisper-server/models/whisperx/align
align_enabled = true
vad_backend = pyannote
vad_onset = 0.35
vad_offset = 0.2
local_files_only = true
